# dyff between <(yq . <(helm show values ingress-nginx/ingress-nginx --version v4.10.0)) <(yq eval '. * load("values.yaml")' <(helm show values ingress-nginx/ingress-nginx --version v4.10.0))
# vim -O <(helm show values ingress-nginx/ingress-nginx --version v4.10.0) values.yaml

controller:
# Newer charts seem to establish externalTrafficPolicy to Cluster instead of Local, breaks in Azure
# https://github.com/kubernetes/ingress-nginx/issues/10863
  service:
    externalTrafficPolicy: "Local"
  ingressClassResource:
    default: true
  replicaCount: 2
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 100Mi
