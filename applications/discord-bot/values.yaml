replicaCount: 0
image:
  repository: ghcr.io/equal-vote/discord-bot
  tag: "sha-ffa5595"
env:
  - name: DISCORD_TOKEN
    valueFrom:
      secretKeyRef:
        name: discord-bot
        key: DISCORD_TOKEN
  - name: BOT_DATABASE_PATH
    value: "/tmp/ViewData.db"
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 128Mi
livenessProbe:
  httpGet: null
  exec:
    command:
      - sh
      - -c
      - ls -l /proc/*/exe | grep -q python
readinessProbe:
  httpGet: null
  exec:
    command:
      - sh
      - -c
      - ls -l /proc/*/exe | grep -q python
