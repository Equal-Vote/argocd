# dyff between <(yq . <(helm show values oci://registry.gitlab.com/devopscoop/charts/app --version 0.8.2)) <(yq eval '. * load("values.yaml")' <(helm show values oci://registry.gitlab.com/devopscoop/charts/app --version 0.8.2))
# vim -O <(helm show values oci://registry.gitlab.com/devopscoop/charts/app --version 0.8.2) values.yaml

replicaCount: 0
image:
  repository: ghcr.io/equal-vote/discord-bot
  tag: "sha-f56a38f"
env:
  - name: DISCORD_TOKEN
    valueFrom:
      secretKeyRef:
        name: discord-bot
        key: DISCORD_TOKEN
  - name: BOT_DATABASE_PATH
    value: "/tmp/ViewData.db"
livenessProbe:
  httpGet: null
  exec:
    command:
      - sh
      - -c
      - ls -l /proc/*/exe | grep -q python
readinessProbe:
  httpGet: null
  exec:
    command:
      - sh
      - -c
      - ls -l /proc/*/exe | grep -q python
