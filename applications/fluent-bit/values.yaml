config:
  outputs: |
    [OUTPUT]
        Name                 loki
        Match                kube.*
        Host                 loki.loki.svc.cluster.local
        Port                 3100
        Labels               job=fluent-bit
        Auto_Kubernetes_Labels on
        Line_Format          json
        Buffer_Size          1MB

    [OUTPUT]
        Name                 loki
        Match                host.*
        Host                 loki.loki.svc.cluster.local
        Port                 3100
        Labels               job=fluent-bit-host
        Line_Format          json
        Buffer_Size          1MB
