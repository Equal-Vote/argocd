# dyff between <(yq . <(helm show values grafana-community/loki --version v9.5.4)) <(yq eval '. * load("values.yaml")' <(helm show values grafana-community/loki --version v9.5.4))
# vim -O <(helm show values grafana-community/loki --version v9.5.4) values.yaml

loki:
  # The client_id will need to be filled in after running `tofu apply`.
  # Get it with: tofu output -raw loki_client_id
  # Or: az identity show -n loki -g equalvote --query clientId -o tsv
  podLabels:
    azure.workload.identity/use: "true"
  commonConfig:
    replication_factor: 1

  # Fixes the "no org id" error in Grafana, in the Explore tab, when using Loki as the data source.
  auth_enabled: false

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: azure
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: azure
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    azure:
      accountName: bettervoting
      useFederatedToken: true
  ingester:
    chunk_encoding: snappy
  limits_config:
    allow_structured_metadata: true
    retention_period: 672h # 28 days
  compactor:
    retention_enabled: true
    delete_request_store: azure
  ruler:
    enable_api: true
  querier:
    max_concurrent: 4

serviceAccount:
  name: loki
  annotations:
    # TODO: Fill in the client ID after running `tofu apply` in the terraform repo.
    # Get it with: az identity show -n loki -g equalvote --query clientId -o tsv
    azure.workload.identity/client-id: "098d7377-8348-4248-b8fb-d67445dff406"

deploymentMode: SingleBinary

sidecar:
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 100Mi

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 28m
      memory: 231Mi
    limits:
      memory: 231Mi
  persistence:
    storageClass: default

# Disable minio - using Azure Blob Storage

# Disable the gateway (NGINX) - Loki is only accessed within the cluster
gateway:
  enabled: false

# Note: The Loki Helm chart requires canary to be enabled
lokiCanary:
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 100Mi

# Disable monitoring components to save resources
resultsCache:
  enabled: false

chunksCache:
  enabled: false

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
