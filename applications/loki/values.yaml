loki:
  resources:
    requests:
      cpu: 100m
      memory: 224Mi
    limits:
      memory: 224Mi

promtail:
  resources:
    requests:
      cpu: 50m
      memory: 123Mi
    limits:
      memory: 123Mi

grafana:
  enabled: true
  adminPassword: admin
  service:
    type: ClusterIP
  persistence:
    enabled: false
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
    hosts:
      - logs.prod.equal.vote
    tls:
      - secretName: grafana-tls
        hosts:
          - logs.prod.equal.vote
  resources:
    requests:
      cpu: 50m
      memory: 165Mi
    limits:
      memory: 165Mi
