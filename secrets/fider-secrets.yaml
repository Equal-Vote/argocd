# Decrypt existing secrets.enc.yaml, append one of these blocks with real values,
# and re-encrypt:
#
#   sops --decrypt secrets/secrets.enc.yaml > /tmp/secrets.yaml
#   cat /tmp/secrets.yaml secrets/fider-secrets.yaml > /tmp/merged.yaml
#   sops --encrypt /tmp/merged.yaml > secrets/secrets.enc.yaml
#   rm /tmp/secrets.yaml /tmp/merged.yaml
#
# For the DATABASE_URL, deploy fider-db first, then extract the password:
#   kubectl get secret -n fider fider-db-fider -o jsonpath='{.data.password}' | base64 -d
# Construct: postgres://fider:<PASSWORD>@fider-db-rw.fider.svc.cluster.local:5432/fider?sslmode=disable

---
apiVersion: v1
kind: Secret
metadata:
  name: fider
  namespace: fider
type: Opaque
stringData:
  DATABASE_URL: "postgres://fider:CHANGEME@fider-db-rw.fider.svc.cluster.local:5432/fider?sslmode=disable"
  JWT_SECRET: "CHANGEME-generate-a-strong-random-string-here"
  EMAIL_NOREPLY: "noreply@example.com"
  EMAIL_SMTP_HOST: "smtp.example.com"
  EMAIL_SMTP_PORT: "587"
  EMAIL_SMTP_USERNAME: "user@example.com"
  EMAIL_SMTP_PASSWORD: "CHANGEME"
